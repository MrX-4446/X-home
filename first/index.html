<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 主题预设：React 挂载前执行，避免首屏闪烁 -->
    <script>
      (function () {
        var t = localStorage.getItem('x_theme')
        document.documentElement.setAttribute('data-theme', t === 'night' ? 'night' : 'light')
      })()
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>X · 阅读伙伴</title>
    <!-- PWA 主题色与图标 -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="description" content="AI 恋人聊天与阅读伙伴" />
    <link rel="icon" type="image/svg+xml" href="/app-icon.svg" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />
    <!-- iOS 全屏运行支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="X" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
