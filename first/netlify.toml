# =============================================================
# 前端 Netlify 配置（优化版）
# 目标：节省带宽积分 + 优化加载速度
# =============================================================

[build]
  command = "npm run build"
  publish = "dist"

# =============================================================
# 缓存策略 - 节省带宽积分
# =============================================================

# ✅ 静态资源（JS/CSS/图片）- 长期缓存（文件名带 hash，更新自动失效）
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ✅ HTML 文件 - 不缓存（确保每次部署都能拿到最新版本）
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ✅ 其他静态文件 - 缓存 1 天
[[headers]]
  for = "/*.{js,css,png,jpg,jpeg,gif,svg,ico,woff,woff2,ttf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# =============================================================
# SPA 路由回退 - React Router 需要
# =============================================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
